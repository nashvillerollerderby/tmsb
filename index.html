    <!-- ── CRG offline warning ─────────────────────────────────────────── -->
    <div id="crg-offline" style="display:none">
      <div id="crg-offline-inner">
        <div id="crg-offline-icon">&#9888;</div>
        <div id="crg-offline-title">Cannot reach CRG Scoreboard</div>
        <div id="crg-offline-detail"></div>
        <div id="crg-offline-hint">Check the IP &amp; port in the <strong>Admin panel &rarr; CRG Connection</strong></div>
      </div>
    </div>
    <style>
      #crg-offline {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,.82);
        font-family: 'Barlow Condensed', sans-serif;
      }
      #crg-offline-inner {
        text-align: center; color: #fff; padding: 2em 3em;
        background: #1a1a1a; border: 2px solid #c00;
        border-radius: 12px; max-width: 480px;
      }
      #crg-offline-icon  { font-size: 3em; color: #e55; margin-bottom: .2em; }
      #crg-offline-title { font-size: 1.6em; font-weight: 700; margin-bottom: .4em; }
      #crg-offline-detail{ font-size: 1em; color: #aaa; margin-bottom: .8em; min-height: 1.4em; }
      #crg-offline-hint  { font-size: .95em; color: #ccc; line-height: 1.4; }
      #crg-offline-hint strong { color: #fff; }
    </style>
    <script>
      (function () {
        var hasEverConnected = false;

        document.addEventListener('tmsb:crgfailed', function (e) {
          var reason  = (e.detail && e.detail.reason) || 'unknown';
          var secs    = Math.round((window._TMSB_TIMEOUT_MS || 5000) / 1000);
          var msgMap  = {
            timeout: 'No response after ' + secs + ' s — the configured host may be offline or unreachable',
            error:   'The configured host is reachable but CRG Scoreboard does not appear to be running'
          };
          document.getElementById('crg-offline-detail').textContent =
            msgMap[reason] || 'Could not connect to the configured host';
          document.getElementById('crg-offline').style.display = 'flex';
        });

        document.addEventListener('tmsb:wsconnected', function () {
          hasEverConnected = true;
          // Hide offline screen if it was showing (e.g. delayed connect).
          var o = document.getElementById('crg-offline');
          if (o) { o.style.display = 'none'; }
          // Hide reconnecting badge.
          var r = document.getElementById('crg-reconnecting');
          if (r) { r.style.display = 'none'; }
        });

        document.addEventListener('tmsb:wsdisconnected', function () {
          // Only show the reconnecting badge after a successful initial
          // connection — during initial load, crgfailed handles failures.
          if (!hasEverConnected) { return; }
          var r = document.getElementById('crg-reconnecting');
          if (r) { r.style.display = 'flex'; }
        });
      })();
    </script>
    <!-- ────────────────────────────────────────────────────────────────── -->

    <!-- ── CRG reconnecting badge ──────────────────────────────────────── -->
    <!-- Hidden during normal operation. Appears when the WebSocket drops  -->
    <!-- mid-bout and disappears when it reconnects. To hide this from     -->
    <!-- broadcast entirely, add to OBS Custom CSS:                        -->
    <!--   #crg-reconnecting { display: none !important; }                 -->
    <div id="crg-reconnecting">

      Reconnecting to scoreboard&hellip;
    </div>

        left: 50%;

        gap: 8px;

      }
      @keyframes tmsb-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>

    <script>
      (function() {

        /* ─────────────────────────────────────────────
           SCORE CHANGE FLASH + JAM SCORE DELTA FLOAT
           ───────────────────────────────────────────── */
        function armScoreAnimation(scoreEl, delta) {
          var teamEl = scoreEl.closest('.Team');

          // Flash animation on score
          scoreEl.classList.remove('ScoreChanged');
          if (teamEl) teamEl.classList.remove('ScoreChanged');
          void scoreEl.offsetWidth;
          scoreEl.classList.add('ScoreChanged');
          if (teamEl) teamEl.classList.add('ScoreChanged');
          window.clearTimeout(scoreEl._scoreAnimTimer);
          scoreEl._scoreAnimTimer = window.setTimeout(function() {
            scoreEl.classList.remove('ScoreChanged');
            if (teamEl) teamEl.classList.remove('ScoreChanged');
          }, 720);

          // Delta float: show +N floating up above the score
          if (delta > 0 && teamEl) {
            var existing = teamEl.querySelector('.ScoreDelta');
            if (existing) existing.remove();
            var delta_el = document.createElement('div');
            delta_el.className = 'ScoreDelta';
            delta_el.textContent = '+' + delta;
            teamEl.appendChild(delta_el);
            // Remove after animation completes
            window.setTimeout(function() {
              if (delta_el.parentNode) delta_el.remove();
            }, 1100);
          }
        }

        function normalizeScore(value) {
          return parseInt((value || '').replace(/\s+/g, '').trim(), 10) || 0;
        }

        function scanScores() {
          var scoreEls = document.querySelectorAll('.TeamBox .Team .Score');
          scoreEls.forEach(function(scoreEl) {
            var nextValue = normalizeScore(scoreEl.textContent);
            if (!scoreEl.textContent.trim()) return;

            var lastValue = scoreEl.dataset.lastScoreValue;
            if (lastValue === undefined) {
              scoreEl.dataset.lastScoreValue = nextValue;
              return;
            }

            lastValue = parseInt(lastValue, 10) || 0;
            if (nextValue !== lastValue) {
              var delta = nextValue - lastValue;
              scoreEl.dataset.lastScoreValue = nextValue;
              armScoreAnimation(scoreEl, delta);
            }
          });
        }

        /* ─────────────────────────────────────────────
           JAM CLOCK URGENCY (under 10 seconds)
           ───────────────────────────────────────────── */
        function parseClockSeconds(text) {
          // Handles "M:SS" or "SS" formats
          text = (text || '').replace(/\s+/g, '').trim();
          if (!text) return null;
          var parts = text.split(':');
          if (parts.length === 2) {
            return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
          }
          return parseInt(parts[0], 10) || null;
        }

        function scanJamClock() {
          var jamClockEl = document.querySelector('[sbContext="Clock(Jam)"].sbClock');
          var teamBox    = document.querySelector('.TeamBox');
          var clockBox   = document.querySelector('.AnimatedPanel.TopClock');
          if (!teamBox) return;

          // Always release urgency the moment the jam ends
          if (!teamBox.classList.contains('InJam')) {
            teamBox.classList.remove('JamUrgent');
            if (clockBox) clockBox.classList.remove('JamUrgent');
            return;
          }

          if (!jamClockEl) return;
          var secs = parseClockSeconds(jamClockEl.textContent);
          if (secs === null) return;

          var urgent = secs <= 10 && secs >= 0;
          teamBox.classList.toggle('JamUrgent', urgent);
          if (clockBox) clockBox.classList.toggle('JamUrgent', urgent);
        }

        function scanPeriodClock() {
          var periodClockEl = document.querySelector('[sbContext="Clock(Period)"].sbClock');
          var clockBox      = document.querySelector('.AnimatedPanel.TopClock');
          if (!periodClockEl || !clockBox) return;

          var secs = parseClockSeconds(periodClockEl.textContent);
          if (secs === null) return;

          var teamBox = document.querySelector('.TeamBox');
          var inJam = teamBox && teamBox.classList.contains('InJam');
          var urgent = secs <= 60 && secs >= 0 && inJam;

          clockBox.classList.toggle('PeriodUrgent', urgent);
        }

        /* ─────────────────────────────────────────────
           TIMEOUT TYPE STYLING
           Watches ClockDescription text and applies a
           class to the clock box for color-coded styling
           ───────────────────────────────────────────── */
        var TIMEOUT_CLASSES = ['TimeoutOfficial','TimeoutTeam','TimeoutReview'];

        function matchTimeoutOwnerToTeam(rawOwner) {
          var raw = String(rawOwner || '').trim();
          if (!raw) return '';
          var lower = raw.toLowerCase();
          var teamFields = ['Id','Name','AlternateName','AlternateName(overlay)','FullName','LeagueName'];
          for (var teamId = 1; teamId <= 2; teamId += 1) {
            for (var i = 0; i < teamFields.length; i += 1) {
              var key = 'ScoreBoard.CurrentGame.Team(' + teamId + ').' + teamFields[i];
              var value = window.WS && window.WS.state && window.WS.state[key];
              if (!value) continue;
              var candidate = String(value).trim();
              if (!candidate) continue;
              var candidateLower = candidate.toLowerCase();
              if (raw === candidate || lower === candidateLower || lower.indexOf(candidateLower) !== -1) {
                return String(teamId);
              }
            }
          }
          return '';
        }

        function normalizeTimeoutOwner(owner) {
          if (owner === undefined || owner === null) return '';
          var raw = String(owner).trim();
          if (!raw) return '';
          var lower = raw.toLowerCase();
          if (raw === 'O' || lower === 'official' || lower === 'official timeout') return 'O';
          if (raw === '1' || raw === '2') return raw;
          var explicitTeam = lower.match(/(?:^|[^a-z])team\s*[\(\[]?\s*([12])\s*[\)\]]?(?:[^a-z]|$)/i)
            || lower.match(/(?:^|[^a-z])t([12])(?:[^a-z]|$)/i);
          if (explicitTeam) return explicitTeam[1];
          if (/(^|[^a-z])home([^a-z]|$)|(^|[^a-z])left([^a-z]|$)/i.test(lower)) return '1';
          if (/(^|[^a-z])away([^a-z]|$)|(^|[^a-z])right([^a-z]|$)/i.test(lower)) return '2';
          return matchTimeoutOwnerToTeam(raw);
        }

        function inferTimeoutOwnerFromDots() {
          var team1Current = document.querySelector('.TeamBox [Team="1"] .Dot.Timeout1.Current, .TeamBox [Team="1"] .Dot.Timeout2.Current, .TeamBox [Team="1"] .Dot.Timeout3.Current');
          var team2Current = document.querySelector('.TeamBox [Team="2"] .Dot.Timeout1.Current, .TeamBox [Team="2"] .Dot.Timeout2.Current, .TeamBox [Team="2"] .Dot.Timeout3.Current');
          if (team1Current && !team2Current) return '1';
          if (team2Current && !team1Current) return '2';
          return '';
        }

        function getTimeoutOwner() {
          var owner = (window.WS && window.WS.state && window.WS.state['ScoreBoard.CurrentGame.TimeoutOwner']) || '';
          return normalizeTimeoutOwner(owner) || inferTimeoutOwnerFromDots();
        }

        function getTeamTimeoutColors(owner) {
          owner = normalizeTimeoutOwner(owner) || inferTimeoutOwnerFromDots();
          if (!owner || owner === 'O') return null;
          var cfg = window.TMSB_CONFIG || {};
          var bg = (window.WS && window.WS.state && window.WS.state['ScoreBoard.CurrentGame.Team(' + owner + ').Color(overlay.bg)'])
            || localStorage.getItem('tmsb_team' + owner + '_color_bg')
            || cfg['TEAM' + owner + '_COLOR_BG'];
          var fg = (window.WS && window.WS.state && window.WS.state['ScoreBoard.CurrentGame.Team(' + owner + ').Color(overlay.fg)'])
            || localStorage.getItem('tmsb_team' + owner + '_color_fg')
            || cfg['TEAM' + owner + '_COLOR_FG'];
          if (!bg && !fg) return null;
          return {
            bg: bg || '#888888',
            fg: fg || '#111111'
          };
        }

        function clearTimeoutTeamColors(clockBox) {
          clockBox.style.removeProperty('--timeout-team-bg');
          clockBox.style.removeProperty('--timeout-team-fg');
        }

        function applyTimeoutClass(clockBox, text) {
          TIMEOUT_CLASSES.forEach(function(c) { clockBox.classList.remove(c); });
          clearTimeoutTeamColors(clockBox);
          if (!text) return;
          var t = text.trim().toLowerCase();
          if (t === 'official timeout') {
            clockBox.classList.add('TimeoutOfficial');
          } else if (t === 'team timeout') {
            var owner = getTimeoutOwner();
            var colors = getTeamTimeoutColors(owner);
            if (colors) {
              clockBox.style.setProperty('--timeout-team-bg', colors.bg);
              clockBox.style.setProperty('--timeout-team-fg', colors.fg);
            }
            clockBox.classList.add('TimeoutTeam');
          } else if (t === 'official review') {
            clockBox.classList.add('TimeoutReview');
          }
        }

        function bootTimeoutWatcher() {
          var desc    = document.querySelector('.ClockDescription');
          var clockBox = document.querySelector('.AnimatedPanel.TopClock');
          if (!desc || !clockBox) return;

          var obs = new MutationObserver(function() {
            applyTimeoutClass(clockBox, desc.textContent);
          });
          obs.observe(desc, { childList: true, subtree: true, characterData: true });
          applyTimeoutClass(clockBox, desc.textContent);
        }

        function scanWinner() {
          var team1 = document.querySelector('.TeamBox [Team="1"]');
          var team2 = document.querySelector('.TeamBox [Team="2"]');
          if (!team1 || !team2) return;

          var st = (window.WS && window.WS.state) ? window.WS.state : {};
          var isOfficial = !!st['ScoreBoard.CurrentGame.OfficialScore'];
          var teamBox = document.querySelector('.TeamBox');
          var hasOfficialDomState = !!(teamBox && teamBox.classList.contains('OfficialScore'));

          if (!isOfficial || !hasOfficialDomState) {
            // Not final/official yet — clear any winner classes.
            team1.classList.remove('Winner');
            team2.classList.remove('Winner');
            return;
          }

          var scoreEls = document.querySelectorAll('.TeamBox .Team .Score');
          if (scoreEls.length < 2) return;

          var s1 = parseInt(scoreEls[0].textContent.trim(), 10) || 0;
          var s2 = parseInt(scoreEls[1].textContent.trim(), 10) || 0;

          team1.classList.toggle('Winner', s1 > s2);
          team2.classList.toggle('Winner', s2 > s1);
        }

        function boot() {
          scanScores();
          scanJamClock();
          scanPeriodClock();
          scanWinner();
          window.setInterval(scanScores, 120);
          window.setInterval(scanJamClock, 100);
          window.setInterval(scanPeriodClock, 100);
          window.setInterval(scanWinner, 250);
          bootTimeoutWatcher();
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();
    </script>

  </body>
</html>
